version: "3.9"

services:
  # ── PostgreSQL 16 com PostGIS ──────────────────────────
  db:
    image: postgis/postgis:16-3.4
    container_name: afaia_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: afaia
      POSTGRES_PASSWORD: afaia_secret
      POSTGRES_DB: afaiamaps
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/src/db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U afaia -d afaiamaps"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend API ────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: afaia_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 3000
      NODE_ENV: development
      DATABASE_URL: postgresql://afaia:afaia_secret@db:5432/afaiamaps
      JWT_SECRET: dev_secret_troque_em_producao
      JWT_EXPIRES_IN: 7d
      FRONTEND_URL: http://localhost:5173
      UPLOAD_DIR: /app/uploads
      MAX_FILE_SIZE_MB: 200
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules
      - uploads:/app/uploads

  # ── Frontend (servidor estático simples) ──────────────
  frontend:
    image: nginx:alpine
    container_name: afaia_frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api

volumes:
  pgdata:
  uploads:
